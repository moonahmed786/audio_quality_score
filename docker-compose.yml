services:
  app:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Audio Quality Score"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: audio_quality_score
      DB_USERNAME: audio_user
      DB_PASSWORD: audio_secret
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      FILESYSTEM_DISK: local
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: audio_quality_score
      MYSQL_USER: audio_user
      MYSQL_PASSWORD: audio_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  app_storage:
  app_cache:
  mysql_data:
